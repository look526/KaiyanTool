apiVersion: apps/v1
kind: Deployment
metadata:
  name: kaiyan-web
  namespace: kaiyan
  labels:
    app: kaiyan-web
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: kaiyan-web
  template:
    metadata:
      labels:
        app: kaiyan-web
        version: v1
    spec:
      containers:
        - name: kaiyan-web
          image: kaiyan/web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: VITE_API_URL
              value: "https://api.kaiyantool.com"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: kaiyan-web
  namespace: kaiyan
  labels:
    app: kaiyan-web
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: kaiyan-web
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kaiyan-web-hpa
  namespace: kaiyan
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kaiyan-web
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
