<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开演AI - AI 内容创作平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
        }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-content {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(240, 147, 251, 0.4);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .logo-icon svg {
            width: 28px;
            height: 28px;
            color: white;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }

        .logo-text {
            font-size: 28px;
            font-weight: 800;
            color: white;
            letter-spacing: -1px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .nav-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .theme-toggle {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
            color: white;
        }

        .cta-button {
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            box-shadow: 0 8px 24px rgba(240, 147, 251, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(240, 147, 251, 0.5);
        }

        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 120px 32px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hero-content {
            text-align: center;
            max-width: 900px;
            position: relative;
            z-index: 1;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 28px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 48px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .badge svg {
            width: 20px;
            height: 20px;
        }

        .badge span {
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .hero-title {
            font-size: clamp(64px, 10vw, 96px);
            font-weight: 900;
            margin-bottom: 32px;
            line-height: 1.05;
            color: white;
            text-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            letter-spacing: -2px;
        }

        .hero-title-gradient {
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 50%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        }

        .hero-description {
            font-size: 22px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.8;
            margin-bottom: 56px;
            max-width: 640px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .hero-description strong {
            color: #fff;
            font-weight: 700;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .hero-button {
            padding: 20px 48px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            box-shadow: 0 12px 40px rgba(240, 147, 251, 0.5);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 0.5px;
        }

        .hero-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 48px rgba(240, 147, 251, 0.6);
        }

        .hero-button svg {
            width: 24px;
            height: 24px;
        }

        .hero-button-secondary {
            padding: 20px 48px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .hero-button-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .hero-button-secondary svg {
            width: 24px;
            height: 24px;
        }

        .features {
            padding: 120px 32px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .features-header {
            text-align: center;
            margin-bottom: 64px;
        }

        .features-title {
            font-size: 48px;
            font-weight: 800;
            color: white;
            margin-bottom: 24px;
            text-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            letter-spacing: -1px;
        }

        .features-subtitle {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.8);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 40px;
            max-width: 1280px;
            margin: 0 auto;
        }

        .feature-card {
            display: flex;
            flex-direction: column;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .feature-card:hover {
            transform: translateY(-12px);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.15);
        }

        .feature-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            border-radius: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(240, 147, 251, 0.4);
            transition: all 0.3s ease;
        }

        .feature-card:hover .feature-icon {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 12px 32px rgba(240, 147, 251, 0.6);
        }

        .feature-icon svg {
            width: 36px;
            height: 36px;
            color: white;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }

        .feature-title {
            font-size: 24px;
            font-weight: 700;
            color: white;
            margin-bottom: 16px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            letter-spacing: -0.5px;
        }

        .feature-description {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.7;
        }

        .footer {
            padding: 48px 32px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-align: center;
        }

        .footer p {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            margin: 0;
        }

        @media (max-width: 768px) {
            .hero-title {
                font-size: 56px;
            }
            
            .hero-description {
                font-size: 20px;
            }
            
            .features-grid {
                grid-template-columns: 1fr;
            }

            .nav-content {
                padding: 0 20px;
            }

            .container {
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-content">
            <div class="logo" onclick="window.location.href='/'">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L15.5 8.5L12 12L8.5 15.5L12 22" stroke="white"/>
                    </svg>
                </div>
                <span class="logo-text">开演AI</span>
            </div>
            <div class="nav-actions">
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5" stroke="white"/>
                        <path d="M12 1v4" stroke="white"/>
                    </svg>
                </button>
                <button class="cta-button" onclick="window.location.href='/projects'">
                    开始创作
                </button>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <div class="badge">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L15.5 8.5L12 12L8.5 15.5L12 22" stroke="white"/>
                </svg>
                <span>AI 内容创作平台</span>
            </div>

            <h1 class="hero-title">
                <span class="hero-title-gradient">开演AI</span>
            </h1>

            <p class="hero-description">
                从剧本到视频的完整创作工作流，让 <strong>AI</strong> 成为您的创作伙伴
            </p>

            <div class="hero-actions">
                <button class="hero-button" onclick="window.location.href='/projects'">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 5 12 19" stroke="white"/>
                    </svg>
                    立即开始
                </button>
                <button class="hero-button-secondary" onclick="window.location.href='/projects'">
                    了解更多
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14" stroke="white"/>
                    </svg>
                </button>
            </div>
        </div>
    </section>

    <section class="features">
        <div class="container">
            <div class="features-header">
                <h2 class="features-title">核心功能</h2>
                <p class="features-subtitle">强大的 AI 工具，让创作变得前所未有的简单</p>
            </div>
            
            <div class="features-grid">
                <a class="feature-card" href="/projects">
                    <div class="feature-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2L15.5 8.5L12 12L8.5 15.5L12 22" stroke="white"/>
                        </svg>
                    </div>
                    <h3 class="feature-title">AI 驱动创作</h3>
                    <p class="feature-description">利用先进AI技术，从剧本到视频，全程智能辅助</p>
                </a>

                <a class="feature-card" href="/projects">
                    <div class="feature-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z" stroke="white"/>
                            <polyline points="14 2 14 8 20 8" stroke="white"/>
                        </svg>
                    </div>
                    <h3 class="feature-title">剧本/小说输入</h3>
                    <p class="feature-description">支持多种输入方式，灵活适配您的创作流程</p>
                </a>

                <a class="feature-card" href="/projects">
                    <div class="feature-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="white"/>
                            <circle cx="9" cy="7" r="4" stroke="white"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87" stroke="white"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75" stroke="white"/>
                        </svg>
                    </div>
                    <h3 class="feature-title">角色一致性</h3>
                    <p class="feature-description">强大的角色管理系统，确保视觉高度一致</p>
                </a>

                <a class="feature-card" href="/projects">
                    <div class="feature-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="12 2 2 7 12 12 22 7 22 12 12" stroke="white"/>
                            <polyline points="2 17 12 22 12 17" stroke="white"/>
                            <polyline points="2 12 12 22 12 7" stroke="white"/>
                        </svg>
                    </div>
                    <h3 class="feature-title">分镜管理</h3>
                    <p class="feature-description">专业的镜头规划和九宫格预览</p>
                </a>

                <a class="feature-card" href="/projects">
                    <div class="feature-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="13 2 3 14 12 14 22 3 14 12 2" stroke="white"/>
                            <path d="M13 2L3 14h9" stroke="white"/>
                        </svg>
                    </div>
                    <h3 class="feature-title">批量生成</h3>
                    <p class="feature-description">高效的图像和视频批量生成能力</p>
                </a>

                <a class="feature-card" href="/projects">
                    <div class="feature-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="20" x2="18" y2="10" stroke="white"/>
                            <line x1="12" y1="20" x2="12" y2="4" stroke="white"/>
                            <line x1="6" y1="20" x2="6" y2="14" stroke="white"/>
                        </svg>
                    </div>
                    <h3 class="feature-title">数据可视化</h3>
                    <p class="feature-description">清晰的项目进度和资产视图</p>
                </a>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>© 2025 开演AI. All rights reserved.</p>
        </div>
    </footer>

    <script>
        function toggleTheme() {
            document.body.style.background = document.body.style.background.includes('#667eea') 
                ? 'linear-gradient(135deg, #0f172a 0%, #1e293b 100%)'
                : 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
        }
    </script>
</body>
</html>
