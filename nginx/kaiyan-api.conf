# Nginx配置文件
# 使用方法：
# 1. 将此文件复制到 /etc/nginx/sites-available/kaiyan-api
# 2. 创建软链接：sudo ln -s /etc/nginx/sites-available/kaiyan-api /etc/nginx/sites-enabled/
# 3. 测试配置：sudo nginx -t
# 4. 重启Nginx：sudo systemctl restart nginx

# HTTP服务器配置（重定向到HTTPS）
server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # 将HTTP请求重定向到HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS服务器配置
server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # SSL证书配置
    # 方式一：使用腾讯云SSL证书
    ssl_certificate /path/to/your/cert.pem;
    ssl_certificate_key /path/to/your/key.pem;

    # 方式二：使用Let's Encrypt（免费证书）
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # SSL安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 日志配置
    access_log /var/log/nginx/kaiyan-api-access.log;
    error_log /var/log/nginx/kaiyan-api-error.log;

    # 客户端上传大小限制
    client_max_body_size 100M;

    # API反向代理配置
    location /api/ {
        # 代理到本地API服务器
        proxy_pass http://127.0.0.1:4000;

        # WebSocket支持（如果需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # 代理头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # 超时配置
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 禁用缓存（API请求）
        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;

        # 支持大文件上传
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # 静态文件服务（前端部署）
    location / {
        root /var/www/kaiyan-frontend/dist;
        try_files $uri $uri/ /index.html;
        index index.html;

        # 静态资源缓存
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Gzip压缩
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;
    }

    # 健康检查端点
    location /health {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # 安全头配置
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

